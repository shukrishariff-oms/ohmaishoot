version: '3.8'

services:
  backend:
    build:
      context: ./backend
    # We expose the port to the internal Docker network instead of mapping it to the host
    # to avoid port allocation conflicts on Coolify.
    expose:
      - "8000"
    volumes:
      # We map persistent volumes to the paths used by the Python application
      - ohmaishoot-db:/app/data
      - ohmaishoot-covers:/app/storage/covers
    environment:
      # Fallback to local CORS if not provided
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ohmaishoot-db:
  ohmaishoot-covers:
